<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><meta name="theme-color" content="#171512">
  <title>The Rings of Power — Episode Companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell"><main class="main-content">
    <header class="topbar"><div><p class="eyebrow">Episode Companion</p><h1>The Rings of Power</h1></div><button id="share-button" class="button secondary">Share</button></header>
    <button id="settings-button" class="settings-summary button-card" type="button"><span><span class="mini-label">Spoilers through</span><strong id="settings-summary"></strong></span><span class="muted">Change ⌄</span></button>
    <section id="episodes-view" aria-label="Episodes"><div id="episode-grid" class="horizontal-rail episode-rail compact-episodes"></div><article id="episode-card" class="episode-page"></article></section>
    <section id="browse-view" hidden aria-label="Browse story world"><div class="browse-header"><p class="eyebrow">Quick reference</p><h2>Browse the story world</h2><p class="muted">Search only what has been revealed up to your spoiler setting.</p><input id="browse-search" type="search" placeholder="Search the story world…" autocomplete="off"></div><div id="browse-filters" class="filter-rail"></div><div id="browse-results" class="browse-grid"></div></section>
  </main><nav class="bottom-nav" aria-label="Primary"><button id="episodes-tab" class="nav-tab active" type="button">Episodes</button><button id="browse-tab" class="nav-tab" type="button">Browse</button></nav></div>
  <div id="modal-root"></div>
  <script src="data/core.js"></script><script src="data/characters.js"></script><script src="data/lore.js"></script><script src="data/seasons-init.js"></script>
  <script src="data/s1-galadriel.js"></script><script src="data/s1-southlands.js"></script><script src="data/s1-elrond.js"></script><script src="data/s1-harfoots.js"></script><script src="data/s1-isildur.js"></script>
  <script src="data/s2-galadriel.js"></script><script src="data/s2-elrond.js"></script><script src="data/s2-numenor.js"></script><script src="data/s2-stranger.js"></script><script src="data/s2-southlands.js"></script>
  <script src="data/rails.js"></script><script src="data/lore-expansion.js"></script><script src="data/episode-expansion.js"></script><script src="app.js"></script>
</body></html>
